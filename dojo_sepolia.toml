[world]
name = "Glitch Bomb"
seed = "glitchbomb-v0.0.30"
description = "Glitch Bomb is a cosmic-themed push-your-luck rogue-like bag-building game where players draw orbs from a bag to score points while avoiding bombs. What makes this game compelling is its brilliant tension between greed and survival, where every tap of the moon bag could yield valuable points or deal devastating damage, ending a nail-biting, breath taking, one of a lifetime run. Will you risk it for moon rocks, or will you just kick rocks?"
website = "https://glitchbomb.gg"

[namespace]
default = "GLITCHBOMB"

[env]
rpc_url = "https://api.cartridge.gg/x/starknet/sepolia"
world_address = "0x06e93be73d7980ad655b7e019148074edcb75e524b187a8b7997595ea16e2c93"
account_address = "0x059b1a0c489b635d7c7f43594d187362ddd2dcea6c82db4eef2579fd185b3753"
keystore_path = "./keystore_sepolia.json"

[migration]
order_inits = [
  "GLITCHBOMB-Token",
  "GLITCHBOMB-Setup",
  "GLITCHBOMB-Play",
  "GLITCHBOMB-Collection",
  "GLITCHBOMB-Vault",
  "GLITCHBOMB-Faucet",
]
skip_contracts = ["GLITCHBOMB-VRF"]
disable_multicall = true

[writers]
"GLITCHBOMB" = ["GLITCHBOMB-Play", "GLITCHBOMB-Setup"]

[owners]
"GLITCHBOMB" = [
  "GLITCHBOMB-Collection",
  "GLITCHBOMB-Vault",
  "GLITCHBOMB-Faucet",
  "GLITCHBOMB-Token",
]

